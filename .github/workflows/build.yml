name: Build and Test

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest   # GitHub lance une machine Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v3   # Télécharge ton code

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests   # Compile le projet